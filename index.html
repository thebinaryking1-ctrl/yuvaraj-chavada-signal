<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUVRAJ CHAVDA | LIVE CHART TERMINAL</title>
    <style>
        :root { 
            --gold: #ffcc00; 
            --dark-bg: #05070a; 
            --card-bg: #11161d; 
            --border: #30363d; 
            --sell: #ff3333; 
            --buy: #00ff88; 
            --whatsapp: #25d366;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark-bg); 
            color: #e2e8f0; 
            margin: 0; 
            padding: 0; 
        }

        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: #000; }
        .header h1 { 
            margin: 0; font-size: 24px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px;
        }

        .container { max-width: 1000px; margin: auto; padding: 15px; }

        /* Multi-Currency Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }

        .trading-card { 
            background: var(--card-bg); 
            border: 2px solid var(--border); 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .signal-header { 
            padding: 15px; 
            background: #1c2128; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .pair-name { font-weight: 800; font-size: 18px; color: #fff; }
        .live-dot { height: 8px; width: 8px; background: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .signal-body { padding: 20px; text-align: center; }
        .direction { font-size: 28px; font-weight: 900; margin: 10px 0; }
        .timer { font-size: 12px; color: var(--gold); font-weight: bold; }

        /* Chart Styling */
        .chart-container { height: 350px; width: 100%; border-top: 1px solid var(--border); }

        .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px; background: var(--whatsapp);
            color: white; padding: 15px 25px; border-radius: 50px; font-weight: bold;
            text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 1000;
        }

        footer { text-align: center; padding: 40px; color: #4a5568; font-size: 12px; }
    </style>
</head>
